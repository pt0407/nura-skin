services:
  postgres:
    image: postgres:16-alpine
    container_name: nura-postgres
    environment:
      POSTGRES_USER: nura
      POSTGRES_PASSWORD: nura_pass
      POSTGRES_DB: nura
    ports:
      - "5432:5432"
    volumes:
      - nura_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nura -d nura"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nura_pg_data:
